version: '3.8'

services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: pgvector-db
    restart: always

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: chatbot

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data
      
  redis:
    image: redis:7
    container_name: redis-chatbot
    ports:
      - "6379:6379"
volumes:
  pgdata: